services:
  db:
    image: postgres:17
    restart: unless-stopped
    env_file: .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready --username=${POSTGRES_USER} --dbname=${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  bot:
    image: ghcr.io/burmisha/wsdbtg:latest
    restart: unless-stopped
    env_file: .env
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
